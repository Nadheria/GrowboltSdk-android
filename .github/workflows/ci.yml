name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build SDK
        run: ./gradlew :growbolt-sdk:assembleRelease

      - name: Run Unit Tests
        run: ./gradlew :growbolt-sdk:test

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: growbolt-sdk-release
          path: growbolt-sdk/build/outputs/aar/growbolt-sdk-release.aar
